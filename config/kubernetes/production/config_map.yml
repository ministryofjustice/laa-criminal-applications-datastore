apiVersion: v1
kind: ConfigMap
metadata:
  name: configmap-production
  namespace: laa-criminal-applications-datastore-production
data:
  ENV_NAME: production
  RACK_ENV: production
  RAILS_ENV: production
  RAILS_SERVE_STATIC_FILES: enabled
  ENABLE_PROMETHEUS_EXPORTER: "true"
  # Datastore is accessed via local cluster networking (no SSL)
  DISABLE_HTTPS: enabled
  MAAT_API_API_URL: https://laa-crime-applications-adaptor-prod.apps.live.cloud-platform.service.justice.gov.uk
  MAAT_API_OAUTH_URL: https://caa-api-prod.auth.eu-west-2.amazoncognito.com
  AUTOMATED_DELETION_TEST_MODE: "false"
